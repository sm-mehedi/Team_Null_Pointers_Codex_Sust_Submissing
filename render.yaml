services:
  - type: web
    name: queuestorm-investigator
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_CORS_ORIGINS
        value: "*"
      - key: RATE_LIMIT_REQUESTS
        value: "60"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: CACHE_TTL_SECONDS
        value: "300"
      - key: SESSION_TTL_SECONDS
        value: "3600"
