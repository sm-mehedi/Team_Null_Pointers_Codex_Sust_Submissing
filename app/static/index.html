<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QueueStorm Investigator · retro</title>
    <style>
      /* === RETRO THEME with smooth day/night toggle === */
      * {
        box-sizing: border-box;
        transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }

      body {
        margin: 0;
        font-family: 'Courier New', Courier, 'IBM Plex Mono', 'Fira Code', monospace;
        background: #f2efe6;
        color: #2b2b2b;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* night mode (dark) */
      body.night {
        background: #1e1e1e;
        color: #e0e0e0;
      }
      body.night header {
        background: #2a2a2a;
        border-bottom: 2px solid #4a4a4a;
        box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      }
      body.night .panel {
        background: #252525;
        border: 2px solid #3d3d3d;
        box-shadow: 4px 4px 0 #0f0f0f;
      }
      body.night textarea,
      body.night pre {
        background: #1a1a1a;
        color: #d4d4d4;
        border: 2px solid #3d3d3d;
        box-shadow: inset 2px 2px 0 #0f0f0f;
      }
      body.night button {
        background: #3a3a3a;
        color: #f0f0f0;
        border: 2px solid #5a5a5a;
        box-shadow: 3px 3px 0 #0f0f0f;
      }
      body.night button.secondary {
        background: #2d2d2d;
        border-color: #4a4a4a;
      }
      body.night button:hover {
        background: #4f4f4f;
        transform: translate(-1px, -1px);
        box-shadow: 4px 4px 0 #0f0f0f;
      }
      body.night .status { color: #b0b0b0; }
      body.night .error { color: #f28b82; }
      body.night footer {
        border-top: 2px solid #3d3d3d;
        background: #242424;
      }
      body.night .footer-link {
        color: #b8b8b8;
      }
      body.night .footer-link:hover {
        color: #ffffff;
        text-shadow: 0 0 4px #aaaaaa;
      }
      body.night .mode-toggle {
        background: #2d2d2d;
        border: 2px solid #5a5a5a;
        color: #e0e0e0;
      }

      /* day mode - writings visible, retro paper feel */
      body:not(.night) .panel {
        background: #fcf9f0;
        border: 2px solid #b8a88a;
        box-shadow: 6px 6px 0 #b8a88a;
      }
      body:not(.night) textarea,
      body:not(.night) pre {
        background: #fffcf5;
        color: #1e1e1e;
        border: 2px solid #b8a88a;
        box-shadow: inset 3px 3px 0 #d6cbbc;
      }
      body:not(.night) button {
        background: #d9cdb0;
        color: #1f1f1f;
        border: 2px solid #8f7a5a;
        box-shadow: 4px 4px 0 #8f7a5a;
        font-weight: 700;
      }
      body:not(.night) button.secondary {
        background: #c8b99a;
        border-color: #7a684a;
      }
      body:not(.night) button:hover {
        background: #e5d7b8;
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0 #8f7a5a;
      }
      body:not(.night) footer {
        border-top: 2px solid #b8a88a;
        background: #ede7d7;
      }
      body:not(.night) .footer-link {
        color: #3d2e1b;
      }
      body:not(.night) .footer-link:hover {
        color: #000000;
        text-shadow: 0 0 2px #b8a88a;
      }
      body:not(.night) .mode-toggle {
        background: #d9cdb0;
        border: 2px solid #8f7a5a;
        color: #1f1f1f;
      }

      /* layout */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px clamp(16px, 4vw, 48px);
        border-bottom: 2px solid #b8a88a;
        background: #f5efe2;
        flex-wrap: wrap;
      }
      h1 {
        margin: 0;
        font-size: clamp(22px, 3.5vw, 38px);
        letter-spacing: -0.5px;
        font-weight: 700;
        text-shadow: 3px 3px 0 rgba(0,0,0,0.05);
        font-family: 'Courier New', monospace;
        text-transform: uppercase;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .mode-toggle {
        background: #d9cdb0;
        border: 2px solid #8f7a5a;
        border-radius: 40px;
        padding: 6px 18px;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        font-family: 'Courier New', monospace;
        box-shadow: 3px 3px 0 #8f7a5a;
        transition: all 0.15s ease;
        letter-spacing: 0.5px;
      }
      .mode-toggle:hover {
        transform: translate(-1px, -1px);
        box-shadow: 4px 4px 0 #6b5b40;
      }

      main {
        display: grid;
        grid-template-columns: minmax(280px, 0.95fr) minmax(320px, 1.05fr);
        gap: 24px;
        padding: 24px clamp(16px, 4vw, 48px) 20px;
        flex: 1;
      }
      section {
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      label {
        display: block;
        margin: 0 0 6px;
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }
      textarea, pre {
        width: 100%;
        min-height: 480px;
        margin: 0;
        padding: 16px;
        border-radius: 0;
        font: 14px/1.6 'Courier New', 'Fira Code', monospace;
        overflow: auto;
        resize: vertical;
        transition: all 0.2s;
      }
      .panel {
        padding: 14px 12px 12px;
        border-radius: 0;
        background: #fcf9f0;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      button {
        min-height: 40px;
        border-radius: 0;
        padding: 0 18px;
        font-weight: 700;
        cursor: pointer;
        font-family: 'Courier New', monospace;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.15s ease;
        background: #d9cdb0;
        border: 2px solid #8f7a5a;
        box-shadow: 4px 4px 0 #8f7a5a;
      }
      button:active {
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0 #8f7a5a;
      }
      .status {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .error {
        color: #b33c2e;
        font-weight: 700;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        flex: 1;
        min-height: 300px;
      }
      #resultStatus {
        margin-right: auto;
      }

      /* footer */
      footer {
        margin-top: 16px;
        padding: 20px clamp(16px, 4vw, 48px);
        border-top: 2px solid #b8a88a;
        background: #ede7d7;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px 24px;
        font-size: 0.95rem;
      }
      .footer-left {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .footer-left span {
        font-weight: 600;
        opacity: 0.8;
      }
      .footer-links {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 14px 20px;
      }
      .footer-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        font-weight: 600;
        border-bottom: 2px solid transparent;
        transition: border-color 0.15s, color 0.15s;
        color: #3d2e1b;
      }
      .footer-link:hover {
        border-bottom-color: currentColor;
      }
      .footer-link svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
        display: inline-block;
      }
      .footer-link .github-icon {
        width: 22px;
        height: 22px;
      }
      .footer-right {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      @media (max-width: 900px) {
        main { grid-template-columns: 1fr; }
        textarea, pre { min-height: 280px; }
        footer { flex-direction: column; align-items: flex-start; }
        .footer-right { width: 100%; justify-content: flex-start; }
      }
    </style>
  </head>
  <body>

      <h1>🕵️ QueueStorm</h1>
      <div class="header-actions">
        <span class="status" id="health">Checking API...</span>
        <button class="mode-toggle" id="modeToggle" aria-label="Toggle day/night">🌙 night</button>
      </div>

          </div>
          <label for="result">📊 Analysis Result</label>
          <pre id="result">{}</pre>

      </section>

    <script>
      (function(){
        // ---- ORIGINAL LOGIC (unchanged) ----
        const sample = {
          ticket_id: "TKT-DEMO-001",
          complaint: "I sent 5000 taka to the wrong number around 2pm today. Please help.",
          language: "en",
          channel: "in_app_chat",
          user_type: "customer",
          campaign_context: "boishakh_bonanza_day_1",
          transaction_history: [
            {
              transaction_id: "TXN-9101",
              timestamp: "2026-04-14T14:08:22Z",
              type: "transfer",
              amount: 5000,
              counterparty: "+8801719876543",
              status: "completed"
            }
          ]
        };

        const payload = document.getElementById("payload");
        const result = document.getElementById("result");
        const resultStatus = document.getElementById("resultStatus");
        const health = document.getElementById("health");

        function pretty(value) {
          return JSON.stringify(value, null, 2);
        }

        async function checkHealth() {
          try {
            const response = await fetch("/health");
            const data = await response.json();
            health.textContent = data.status === "ok" ? "API online" : "API unavailable";
          } catch {
            health.textContent = "API unavailable";
            health.className = "status error";
          }
        }

        document.getElementById("loadSample").addEventListener("click", () => {
          payload.value = pretty(sample);
        });

        document.getElementById("analyze").addEventListener("click", async () => {
          resultStatus.textContent = "Analyzing...";
          resultStatus.className = "status";
          try {
            const body = JSON.parse(payload.value);
            const response = await fetch("/analyze-ticket", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body)
            });
            const data = await response.json();
            result.textContent = pretty(data);
            resultStatus.textContent = response.ok ? "Complete" : `HTTP ${response.status}`;
            resultStatus.className = response.ok ? "status" : "status error";
          } catch (error) {
            result.textContent = String(error);
            resultStatus.textContent = "Invalid request";
            resultStatus.className = "status error";
          }
        });

        payload.value = pretty(sample);
        checkHealth();

        // ---- RETRO DAY/NIGHT TOGGLE (no logic change, only theme) ----
        const toggleBtn = document.getElementById('modeToggle');
        const body = document.body;

        // read initial preference from localStorage
        const stored = localStorage.getItem('queueStormTheme');
        if (stored === 'night') {
          body.classList.add('night');
          toggleBtn.textContent = '☀️ day';
        } else {
          body.classList.remove('night');
          toggleBtn.textContent = '🌙 night';
        }

        toggleBtn.addEventListener('click', function() {
          body.classList.toggle('night');
          const isNight = body.classList.contains('night');
          toggleBtn.textContent = isNight ? '☀️ day' : '🌙 night';
          localStorage.setItem('queueStormTheme', isNight ? 'night' : 'day');
        });
      })();
    </script>
