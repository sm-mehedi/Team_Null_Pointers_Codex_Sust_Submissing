<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QueueStorm Investigator · CYBERPUNK</title>
    <style>
      /* ----- CYBERPUNK THEME (with day/night toggle) ----- */
      * {
        box-sizing: border-box;
        margin: 0;
        transition: background 0.25s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }

      body {
        font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: #0d0f1a;
        color: #b3e5fc;
        margin: 0;
        padding: 0;
        border-top: 4px solid #00f0ff;
        box-shadow: inset 0 0 40px rgba(0, 240, 255, 0.05);
      }

      /* ----- NIGHT (default) ----- */
      :root {
        --bg-body: #0d0f1a;
        --bg-surface: #141828;
        --bg-panel: #1a1f2e;
        --border-glow: #00f0ff;
        --text-primary: #b3e5fc;
        --text-muted: #7a8ba8;
        --text-highlight: #00f0ff;
        --accent-1: #00f0ff;
        --accent-2: #ff2a7a;
        --shadow-glow: 0 0 12px rgba(0, 240, 255, 0.3);
        --code-bg: #0b0e17;
        --btn-bg: #00b8d4;
        --btn-text: #0b0e17;
        --footer-bg: #0a0d16;
        --footer-border: #00f0ff66;
      }

      /* ----- DAY ----- */
      body.day-mode {
        --bg-body: #f2f6fe;
        --bg-surface: #ffffff;
        --bg-panel: #eef2f9;
        --border-glow: #0f766e;
        --text-primary: #0b1a2b;
        --text-muted: #2d4055;
        --text-highlight: #0f766e;
        --accent-1: #0f766e;
        --accent-2: #be123c;
        --shadow-glow: 0 0 12px rgba(15, 118, 110, 0.25);
        --code-bg: #f6f8fb;
        --btn-bg: #0f766e;
        --btn-text: #ffffff;
        --footer-bg: #e4eaf2;
        --footer-border: #0f766e88;
        color: #0b1a2b;
        border-top-color: #0f766e;
      }

      body.day-mode .status,
      body.day-mode .status.error {
        color: #1f3a4b;
      }

      body.day-mode .error {
        color: #be123c;
      }

      /* universal */
      body {
        background: var(--bg-body);
        color: var(--text-primary);
      }

      header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px clamp(16px, 4vw, 48px);
        border-bottom: 2px solid var(--border-glow);
        background: var(--bg-surface);
        box-shadow: 0 4px 20px rgba(0, 240, 255, 0.08);
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 3.5vw, 38px);
        font-weight: 700;
        letter-spacing: 2px;
        text-shadow: 0 0 8px var(--accent-1), 0 0 20px var(--accent-1);
        color: var(--text-highlight);
        background: linear-gradient(135deg, var(--accent-1), #b388ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .header-controls {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
      }

      .toggle-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        cursor: pointer;
        color: var(--text-muted);
      }

      .toggle-track {
        width: 44px;
        height: 24px;
        background: #2a3346;
        border-radius: 40px;
        position: relative;
        border: 1px solid var(--border-glow);
        box-shadow: inset 0 0 8px rgba(0, 240, 255, 0.2);
        transition: 0.2s;
      }

      body.day-mode .toggle-track {
        background: #b0c6dd;
        border-color: #0f766e;
      }

      .toggle-track::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        background: #00f0ff;
        border-radius: 50%;
        transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 0 12px #00f0ff;
      }

      body.day-mode .toggle-track::after {
        left: 22px;
        background: #0f766e;
        box-shadow: 0 0 12px #0f766e;
      }

      .status {
        color: var(--text-muted);
        font-size: 0.9rem;
        font-weight: 500;
        background: var(--bg-panel);
        padding: 4px 14px;
        border-radius: 30px;
        border: 1px solid var(--border-glow);
        box-shadow: var(--shadow-glow);
      }

      .error {
        color: var(--accent-2);
        font-weight: 700;
      }

      main {
        display: grid;
        grid-template-columns: minmax(280px, 0.95fr) minmax(320px, 1.05fr);
        gap: 20px;
        padding: 24px clamp(16px, 4vw, 48px) 20px;
        flex: 1;
      }

      section {
        background: var(--bg-surface);
        border-radius: 16px;
        padding: 16px 18px 20px;
        border: 1px solid var(--border-glow);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), var(--shadow-glow);
        backdrop-filter: blur(2px);
        min-width: 0;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }

      label {
        display: block;
        margin: 0 0 8px;
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--text-highlight);
        text-shadow: 0 0 6px var(--accent-1);
      }

      textarea,
      pre {
        width: 100%;
        min-height: 460px;
        margin: 0;
        padding: 16px;
        border: 1px solid var(--border-glow);
        border-radius: 12px;
        background: var(--code-bg);
        color: var(--text-primary);
        font: 14px/1.6 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
        overflow: auto;
        box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.03);
        resize: vertical;
      }

      pre {
        min-height: 460px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 40px;
        padding: 0 22px;
        background: var(--btn-bg);
        color: var(--btn-text);
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 0.6px;
        cursor: pointer;
        box-shadow: 0 0 16px var(--accent-1), 0 4px 12px rgba(0, 0, 0, 0.4);
        transition: 0.15s;
        text-transform: uppercase;
        border: 1px solid var(--accent-1);
      }

      button:hover {
        transform: scale(1.03) translateY(-2px);
        filter: brightness(1.2);
        box-shadow: 0 0 28px var(--accent-1), 0 8px 20px rgba(0, 0, 0, 0.6);
      }

      button.secondary {
        background: #2a3346;
        color: #b3e5fc;
        border-color: #5f7a9a;
        box-shadow: 0 0 8px #5f7a9a55;
      }

      button.secondary:hover {
        background: #3f4a62;
        border-color: var(--accent-1);
        box-shadow: 0 0 20px var(--accent-1);
      }

      #resultStatus {
        font-weight: 500;
      }

      /* ----- FOOTER (cyberpunk) ----- */
      footer {
        margin-top: 10px;
        padding: 22px clamp(16px, 4vw, 48px) 18px;
        background: var(--footer-bg);
        border-top: 2px solid var(--footer-border);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px 30px;
        box-shadow: 0 -8px 30px rgba(0, 240, 255, 0.04);
        backdrop-filter: blur(2px);
      }

      .footer-left {
        display: flex;
        align-items: center;
        gap: 24px;
        flex-wrap: wrap;
      }

      .footer-left span {
        font-weight: 300;
        letter-spacing: 0.3px;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .team-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 24px;
      }

      .team-links a {
        color: var(--text-highlight);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        border-bottom: 1px dotted transparent;
        transition: 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .team-links a:hover {
        border-bottom-color: var(--accent-1);
        text-shadow: 0 0 10px var(--accent-1);
        color: #fff;
      }

      .footer-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .github-icon {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--bg-panel);
        padding: 6px 18px 6px 14px;
        border-radius: 40px;
        border: 1px solid var(--border-glow);
        text-decoration: none;
        color: var(--text-highlight);
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.2s;
        box-shadow: var(--shadow-glow);
      }

      .github-icon:hover {
        background: var(--accent-1);
        color: #0b0e17;
        box-shadow: 0 0 30px var(--accent-1);
        transform: scale(1.02);
      }

      .github-icon svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
      }

      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
        }
        textarea,
        pre {
          min-height: 300px;
        }
        footer {
          flex-direction: column;
          align-items: flex-start;
        }
        .footer-right {
          width: 100%;
          justify-content: flex-start;
        }
      }

      /* scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
        background: var(--bg-body);
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-panel);
        border-radius: 12px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent-1);
        border-radius: 12px;
        box-shadow: 0 0 12px var(--accent-1);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>⏣ QueueStorm</h1>
      <div class="header-controls">
        <span class="status" id="health">⚡ checking...</span>
        <label class="toggle-label">
          <span>🌙</span>
          <span class="toggle-track" id="toggleTrack"></span>
          <span>☀️</span>
          <input type="checkbox" id="dayToggle" style="display:none" />
        </label>
      </div>
    </header>

    <main>
      <section>
        <div class="toolbar">
          <button class="secondary" id="loadSample">⬡ Load Sample</button>
          <button id="analyze">⟁ Analyze</button>
        </div>
        <label for="payload">⏺ Ticket JSON</label>
        <textarea id="payload" spellcheck="false"></textarea>
      </section>

      <section>
        <div class="toolbar">
          <span class="status" id="resultStatus">⏣ Ready</span>
        </div>
        <label for="result">⏣ Analysis Result</label>
        <pre id="result">{}</pre>
      </section>
    </main>

    <footer>
      <div class="footer-left">
        <span>⚡ TEAM NULL POINTERS</span>
        <div class="team-links">
          <a href="https://www.linkedin.com/in/sm-mehedihasan25/" target="_blank">S. M Mehedi Hasan</a>
          <a href="https://www.linkedin.com/in/sumshun-nahar-eity-379646252/" target="_blank">Sumshun Nahar Eity</a>
          <a href="https://www.linkedin.com/in/hasan-mahmud-karib-4879b732b/" target="_blank">Hasan Mahmud</a>
        </div>
      </div>
      <div class="footer-right">
        <a class="github-icon" href="https://github.com/sm-mehedi/Team_Null_Pointers_Codex_Sust_Submissing" target="_blank">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          <span>Repo</span>
        </a>
      </div>
    </footer>

    <script>
      (function() {
        // ---- sample ----
        const sample = {
          ticket_id: "TKT-DEMO-001",
          complaint: "I sent 5000 taka to the wrong number around 2pm today. Please help.",
          language: "en",
          channel: "in_app_chat",
          user_type: "customer",
          campaign_context: "boishakh_bonanza_day_1",
          transaction_history: [
            {
              transaction_id: "TXN-9101",
              timestamp: "2026-04-14T14:08:22Z",
              type: "transfer",
              amount: 5000,
              counterparty: "+8801719876543",
              status: "completed"
            }
          ]
        };

        const payload = document.getElementById('payload');
        const result = document.getElementById('result');
        const resultStatus = document.getElementById('resultStatus');
        const health = document.getElementById('health');

        function pretty(value) { return JSON.stringify(value, null, 2); }

        // health
        async function checkHealth() {
          try {
            const response = await fetch('/health');
            const data = await response.json();
            health.textContent = data.status === 'ok' ? '⚡ API online' : '⚠️ API unavailable';
            health.className = 'status';
          } catch {
            health.textContent = '⚠️ API unavailable';
            health.className = 'status error';
          }
        }

        document.getElementById('loadSample').addEventListener('click', () => {
          payload.value = pretty(sample);
        });

        document.getElementById('analyze').addEventListener('click', async () => {
          resultStatus.textContent = '⏳ analyzing...';
          resultStatus.className = 'status';
          try {
            const body = JSON.parse(payload.value);
            const response = await fetch('/analyze-ticket', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body)
            });
            const data = await response.json();
            result.textContent = pretty(data);
            resultStatus.textContent = response.ok ? '✔ complete' : `⚠️ HTTP ${response.status}`;
            resultStatus.className = response.ok ? 'status' : 'status error';
          } catch (error) {
            result.textContent = String(error);
            resultStatus.textContent = '⛔ invalid request';
            resultStatus.className = 'status error';
          }
        });

        payload.value = pretty(sample);
        checkHealth();

        // ---- DAY/NIGHT TOGGLE (no logic change) ----
        const toggle = document.getElementById('dayToggle');
        const track = document.getElementById('toggleTrack');
        const body = document.body;

        // initial: night (default)
        function setMode(day) {
          if (day) {
            body.classList.add('day-mode');
            toggle.checked = true;
          } else {
            body.classList.remove('day-mode');
            toggle.checked = false;
          }
        }

        track.addEventListener('click', () => {
          const now = body.classList.contains('day-mode');
          setMode(!now);
        });

        toggle.addEventListener('change', (e) => {
          setMode(e.target.checked);
        });

        // ensure everything visible in day mode (already handled by CSS)
        // also keep track indicator
        window.addEventListener('load', () => {
          // default night
          setMode(false);
        });
      })();
    </script>
  </body>
</html>
