<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QueueStorm Investigator</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #586574;
        --line: #d9e1ea;
        --surface: #ffffff;
        --panel: #f6f8fb;
        --accent: #0f766e;
        --accent-2: #be123c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--panel);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px clamp(16px, 4vw, 48px);
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }
      h1 { margin: 0; font-size: clamp(22px, 3vw, 34px); letter-spacing: 0; }
      main {
        display: grid;
        grid-template-columns: minmax(280px, 0.95fr) minmax(320px, 1.05fr);
        gap: 18px;
        padding: 18px clamp(16px, 4vw, 48px) 36px;
      }
      section {
        min-width: 0;
      }
      label {
        display: block;
        margin: 0 0 8px;
        font-weight: 700;
      }
      textarea, pre {
        width: 100%;
        min-height: 520px;
        margin: 0;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font: 14px/1.5 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        overflow: auto;
      }
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        margin-bottom: 10px;
      }
      button {
        min-height: 38px;
        border: 0;
        border-radius: 8px;
        padding: 0 14px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        background: #344054;
      }
      .status {
        color: var(--muted);
        font-size: 14px;
      }
      .error {
        color: var(--accent-2);
        font-weight: 700;
      }
      @media (max-width: 900px) {
        main { grid-template-columns: 1fr; }
        textarea, pre { min-height: 360px; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>QueueStorm Investigator</h1>
      <span class="status" id="health">Checking API...</span>
    </header>
    <main>
      <section>
        <div class="toolbar">
          <button class="secondary" id="loadSample">Load Sample</button>
          <button id="analyze">Analyze</button>
        </div>
        <label for="payload">Ticket JSON</label>
        <textarea id="payload" spellcheck="false"></textarea>
      </section>
      <section>
        <div class="toolbar">
          <span class="status" id="resultStatus">Ready</span>
        </div>
        <label for="result">Analysis Result</label>
        <pre id="result">{}</pre>
      </section>
    </main>
    <script>
      const sample = {
        ticket_id: "TKT-DEMO-001",
        complaint: "I sent 5000 taka to the wrong number around 2pm today. Please help.",
        language: "en",
        channel: "in_app_chat",
        user_type: "customer",
        campaign_context: "boishakh_bonanza_day_1",
        transaction_history: [
          {
            transaction_id: "TXN-9101",
            timestamp: "2026-04-14T14:08:22Z",
            type: "transfer",
            amount: 5000,
            counterparty: "+8801719876543",
            status: "completed"
          }
        ]
      };

      const payload = document.getElementById("payload");
      const result = document.getElementById("result");
      const resultStatus = document.getElementById("resultStatus");
      const health = document.getElementById("health");

      function pretty(value) {
        return JSON.stringify(value, null, 2);
      }

      async function checkHealth() {
        try {
          const response = await fetch("/health");
          const data = await response.json();
          health.textContent = data.status === "ok" ? "API online" : "API unavailable";
        } catch {
          health.textContent = "API unavailable";
          health.className = "status error";
        }
      }

      document.getElementById("loadSample").addEventListener("click", () => {
        payload.value = pretty(sample);
      });

      document.getElementById("analyze").addEventListener("click", async () => {
        resultStatus.textContent = "Analyzing...";
        resultStatus.className = "status";
        try {
          const body = JSON.parse(payload.value);
          const response = await fetch("/analyze-ticket", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          const data = await response.json();
          result.textContent = pretty(data);
          resultStatus.textContent = response.ok ? "Complete" : `HTTP ${response.status}`;
          resultStatus.className = response.ok ? "status" : "status error";
        } catch (error) {
          result.textContent = String(error);
          resultStatus.textContent = "Invalid request";
          resultStatus.className = "status error";
        }
      });

      payload.value = pretty(sample);
      checkHealth();
    </script>
  </body>
</html>
