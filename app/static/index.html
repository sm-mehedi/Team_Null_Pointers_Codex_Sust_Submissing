<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CYBER · QueueStorm</title>
  <!-- Inter + Orbitron -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free) for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0f1a;
      --card-bg: rgba(16, 24, 40, 0.7);
      --card-border: rgba(0, 255, 200, 0.25);
      --text: #d0e6f5;
      --text-muted: #7fa3b8;
      --accent: #00f0d0;
      --accent-glow: #00f0d080;
      --shadow: 0 0 30px rgba(0, 240, 208, 0.1);
      --btn-bg: rgba(0, 240, 208, 0.12);
      --btn-hover: rgba(0, 240, 208, 0.25);
      --input-bg: rgba(0, 20, 30, 0.7);
      --code-bg: #09141e;
      --transition: 0.25s ease;
      --summary-bg: rgba(0, 30, 40, 0.4);
    }

    body.light-mode {
      --bg: #eef2f8;
      --card-bg: rgba(255, 255, 255, 0.75);
      --card-border: rgba(0, 120, 200, 0.2);
      --text: #0b1e2b;
      --text-muted: #2b5068;
      --accent: #0a7b8c;
      --accent-glow: #0a7b8c60;
      --shadow: 0 8px 32px rgba(0,20,40,0.08);
      --btn-bg: rgba(10, 123, 140, 0.10);
      --btn-hover: rgba(10, 123, 140, 0.20);
      --input-bg: #ffffffcc;
      --code-bg: #f4f8fe;
      --summary-bg: rgba(200, 220, 240, 0.3);
    }

    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
      transition: background var(--transition), color var(--transition);
      position: relative;
      overflow-x: hidden;
    }

    /* ----- CYBER BG ANIMATION ----- */
    .cyber-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .cyber-bg .grid-line {
      position: absolute;
      background: rgba(0, 255, 200, 0.04);
    }
    .cyber-bg .h-line {
      width: 100%;
      height: 1px;
      top: 20%;
      left: 0;
      animation: driftH 22s linear infinite;
    }
    .cyber-bg .v-line {
      width: 1px;
      height: 100%;
      left: 30%;
      top: 0;
      animation: driftV 18s linear infinite;
    }
    .cyber-bg .v-line:nth-child(2) { left: 70%; animation-duration: 24s; }
    .cyber-bg .v-line:nth-child(3) { left: 50%; animation-duration: 30s; opacity: 0.5; }
    .cyber-bg .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      background: #00f0d0;
      width: 400px;
      height: 400px;
      top: 10%;
      left: -5%;
      animation: floatOrb 28s alternate ease-in-out infinite;
    }
    .cyber-bg .glow-orb:nth-child(5) {
      background: #7a4aff;
      width: 300px;
      height: 300px;
      bottom: 10%;
      right: 0%;
      animation-duration: 32s;
      animation-delay: -6s;
      opacity: 0.08;
    }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(80px, 60px) scale(1.3); }
    }
    @keyframes driftH {
      0% { transform: translateX(-10%); }
      100% { transform: translateX(10%); }
    }
    @keyframes driftV {
      0% { transform: translateY(-10%); }
      100% { transform: translateY(10%); }
    }

    /* ----- BENTO GRID ----- */
    .bento-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1440px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      position: relative;
      z-index: 2;
    }

    .bento-card {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 24px 24px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--card-border);
      transition: background var(--transition), border var(--transition), box-shadow var(--transition);
      display: flex;
      flex-direction: column;
    }

    .header-card {
      grid-column: 1 / -1;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      flex-wrap: wrap;
      gap: 10px;
    }

    .header-card h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #00f0d0, #7a4aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-card h1 small {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.85rem;
      background: rgba(0, 240, 208, 0.15);
      -webkit-text-fill-color: var(--text-muted);
      padding: 4px 14px;
      border-radius: 40px;
      border: 1px solid var(--card-border);
      letter-spacing: 0.04em;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .health-badge {
      background: rgba(0, 20, 30, 0.5);
      backdrop-filter: blur(4px);
      padding: 6px 18px 6px 14px;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--card-border);
    }
    .health-badge .dot {
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background: #00f0d0;
      display: inline-block;
      box-shadow: 0 0 12px #00f0d080;
    }
    .health-badge .dot.off {
      background: #ff4d6d;
      box-shadow: 0 0 12px #ff4d6d80;
    }

    /* toggle switch */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.2);
      padding: 4px 6px 4px 12px;
      border-radius: 60px;
      border: 1px solid var(--card-border);
      backdrop-filter: blur(4px);
      cursor: pointer;
      user-select: none;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      transition: 0.2s;
    }
    .theme-toggle .toggle-track {
      width: 34px;
      height: 20px;
      background: #2a4050;
      border-radius: 40px;
      position: relative;
      transition: 0.25s;
      margin-left: 4px;
    }
    .theme-toggle .toggle-track .thumb {
      width: 16px;
      height: 16px;
      background: #00f0d0;
      border-radius: 40px;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: 0.25s;
      box-shadow: 0 0 12px #00f0d060;
    }
    body.light-mode .theme-toggle .toggle-track .thumb {
      left: 16px;
      background: #0a7b8c;
    }
    body.light-mode .theme-toggle .toggle-track {
      background: #b0c8d8;
    }

    /* cards */
    .result-card {
      grid-column: 2 / 3;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* --- new summary box & raw json box --- */
    .result-sub-box {
      background: var(--summary-bg);
      border-radius: 20px;
      padding: 18px 20px;
      border: 1px solid var(--card-border);
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }

    .result-sub-box h3 {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 20px;
    }

    .summary-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .summary-item .icon {
      width: 28px;
      color: var(--accent);
      font-size: 1rem;
      text-align: center;
    }

    .summary-item .label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      min-width: 70px;
    }

    .summary-item .value {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .summary-item .value .tag {
      display: inline-block;
      background: rgba(0, 240, 208, 0.12);
      padding: 2px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      border: 1px solid var(--card-border);
    }

    .summary-item .value .severity-high { color: #ff6b7a; }
    .summary-item .value .severity-medium { color: #ffb347; }
    .summary-item .value .severity-low { color: #5fc8a0; }

    .reason-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .reason-tags span {
      background: rgba(0, 240, 208, 0.08);
      border: 1px solid var(--card-border);
      padding: 2px 12px;
      border-radius: 40px;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .card-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-toolbar label {
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-family: 'Orbitron', monospace;
    }
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      background: var(--btn-bg);
      border: 1px solid var(--card-border);
      border-radius: 60px;
      padding: 6px 18px;
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.02em;
    }
    .btn-primary {
      background: rgba(0, 240, 208, 0.18);
      border-color: #00f0d080;
      color: #00f0d0;
      box-shadow: 0 0 16px #00f0d020;
    }
    .btn-primary:hover {
      background: rgba(0, 240, 208, 0.35);
      transform: scale(0.97);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
    }

    .code-area {
      width: 100%;
      min-height: 180px;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      line-height: 1.6;
      background: var(--code-bg);
      color: var(--text);
      resize: vertical;
      transition: 0.15s;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
    }
    .code-area:focus {
      outline: 2px solid #00f0d060;
      outline-offset: 2px;
    }
    pre.code-area {
      background: var(--code-bg);
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      overflow: auto;
      min-height: 140px;
    }

    .status-line {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 6px;
      font-family: 'Orbitron', monospace;
      letter-spacing: 0.04em;
    }
    .error-tag { color: #ff4d6d; font-weight: 700; }

    /* left card */
    .payload-card .code-area {
      min-height: 340px;
    }

    /* ----- ROBOT ----- */
    .robot-wrapper {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
      margin-bottom: -6px;
      pointer-events: none;
    }
    .robot-container {
      background: rgba(0, 20, 30, 0.5);
      backdrop-filter: blur(8px);
      padding: 10px 28px 10px 24px;
      border-radius: 80px;
      border: 1px solid var(--card-border);
      box-shadow: 0 0 40px rgba(0, 240, 208, 0.06);
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: auto;
      transition: 0.2s;
    }
    .robot-container:hover {
      background: rgba(0, 30, 40, 0.6);
    }
    .robot-face {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
    }
    .robot-eye {
      width: 20px;
      height: 20px;
      background: #0a1a28;
      border-radius: 40px;
      transition: 0.08s linear;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.8), 0 0 0 2px #00f0d080;
      position: relative;
      will-change: transform;
    }
    .robot-eye::after {
      content: '';
      display: block;
      width: 8px;
      height: 8px;
      background: #00f0d0;
      border-radius: 20px;
      position: absolute;
      top: 4px;
      left: 4px;
      opacity: 0.9;
      box-shadow: 0 0 12px #00f0d0;
      transition: 0.1s;
    }
    .robot-mouth {
      font-size: 1.8rem;
      line-height: 1;
      margin-left: 4px;
      letter-spacing: -2px;
      color: #00f0d0;
      text-shadow: 0 0 20px #00f0d060;
    }
    .robot-label {
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: rgba(0, 240, 208, 0.08);
      padding: 4px 14px;
      border-radius: 30px;
      border: 1px solid var(--card-border);
      letter-spacing: 0.1em;
    }

    @media (max-width: 780px) {
      .bento-grid { grid-template-columns: 1fr; gap: 16px; }
      .result-card { grid-column: 1 / 2; }
      .header-card { flex-direction: column; align-items: flex-start; }
      .robot-wrapper { justify-content: center; }
      .summary-grid { grid-template-columns: 1fr; }
      .payload-card .code-area { min-height: 200px; }
    }
    @media (max-width: 480px) {
      body { padding: 12px; }
      .bento-card { padding: 16px; }
      .header-card h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- CYBER BG -->
  <div class="cyber-bg">
    <div class="grid-line h-line"></div>
    <div class="grid-line v-line"></div>
    <div class="grid-line v-line"></div>
    <div class="grid-line v-line"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
  </div>

  <div class="bento-grid">

    <!-- HEADER -->
    <div class="bento-card header-card">
      <h1>
        QueueStorm
        <small>investigator</small>
      </h1>
      <div class="header-controls">
        <div class="health-badge" id="healthBadge">
          <span class="dot" id="healthDot"></span>
          <span id="healthText">online</span>
        </div>
        <div class="theme-toggle" id="themeToggle">
          <span id="themeLabel">⚡</span>
          <div class="toggle-track">
            <div class="thumb" id="toggleThumb"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- LEFT: payload -->
    <div class="bento-card payload-card">
      <div class="card-toolbar">
        <label for="payload">📟 ticket</label>
        <div class="btn-group">
          <button class="btn btn-secondary" id="loadSample">⏣ sample</button>
          <button class="btn btn-primary" id="analyze">▶ analyze</button>
        </div>
      </div>
      <textarea class="code-area" id="payload" spellcheck="false"></textarea>
      <div class="status-line"><span id="payloadStatus">ready</span></div>
    </div>

    <!-- RIGHT: result with two boxes -->
    <div class="bento-card result-card">
      <!-- box 1: user‑friendly summary -->
      <div class="result-sub-box" id="summaryBox">
        <h3><i class="fas fa-star" style="color: var(--accent);"></i> case overview</h3>
        <div class="summary-grid" id="summaryGrid">
          <!-- populated by JS -->
        </div>
      </div>

      <!-- box 2: raw JSON -->
      <div class="result-sub-box" style="flex:1;">
        <div class="card-toolbar" style="margin-bottom:6px;">
          <label for="result">◈ raw json</label>
          <span class="status-line" id="resultStatus" style="margin:0;">await</span>
        </div>
        <pre class="code-area" id="result">{}</pre>
      </div>
    </div>

    <!-- ROBOT -->
    <div class="robot-wrapper">
      <div class="robot-container" id="robotContainer">
        <div class="robot-face">
          <span class="robot-eye" id="eyeLeft"></span>
          <span class="robot-eye" id="eyeRight"></span>
          <span class="robot-mouth" id="robotMouth">⌣</span>
        </div>
        <span class="robot-label">✦ tracker</span>
      </div>
    </div>

  </div>

  <script>
    (function() {
      // DOM
      const payload = document.getElementById('payload');
      const result = document.getElementById('result');
      const resultStatus = document.getElementById('resultStatus');
      const summaryGrid = document.getElementById('summaryGrid');
      const healthText = document.getElementById('healthText');
      const healthDot = document.getElementById('healthDot');
      const loadSampleBtn = document.getElementById('loadSample');
      const analyzeBtn = document.getElementById('analyze');
      const themeToggle = document.getElementById('themeToggle');
      const themeLabel = document.getElementById('themeLabel');
      const toggleThumb = document.getElementById('toggleThumb');

      // robot
      const eyeLeft = document.getElementById('eyeLeft');
      const eyeRight = document.getElementById('eyeRight');
      const robotMouth = document.getElementById('robotMouth');
      const robotContainer = document.getElementById('robotContainer');

      // ---------- SAMPLE (with full fields) ----------
      const SAMPLE = {
        ticket_id: "TKT-DEMO-001",
        relevant_transaction_id: "TXN-9101",
        evidence_verdict: "consistent",
        case_type: "wrong_transfer",
        severity: "high",
        department: "dispute_resolution",
        agent_summary: "Ticket TKT-DEMO-001 appears to be a wrong_transfer case. Relevant transaction TXN-9101 for 5000.0 BDT has status completed. Evidence verdict: consistent.",
        recommended_next_action: "Send transaction TXN-9101 to dispute resolution for verification and possible recovery workflow eligibility review.",
        customer_reply: "We have noted your concern for transaction TXN-9101. Our support team will review it through official channels, and any eligible action will be handled after verification.",
        human_review_required: true,
        confidence: 0.95,
        reason_codes: ["amount_match", "transaction_type_match", "status_supports_claim", "wrong_transfer", "human_review_required"]
      };

      function pretty(v) { return JSON.stringify(v, null, 2); }

      // ---------- theme ----------
      function setTheme(mode) {
        document.body.classList.toggle('light-mode', mode === 'light');
        themeLabel.textContent = mode === 'light' ? '☀️' : '⚡';
        localStorage.setItem('qs-theme', mode);
      }
      function getTheme() { return localStorage.getItem('qs-theme') || 'dark'; }
      setTheme(getTheme());
      themeToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        const isLight = document.body.classList.contains('light-mode');
        setTheme(isLight ? 'dark' : 'light');
      });

      // ---------- health ----------
      async function checkHealth() {
        try {
          const resp = await fetch('/health');
          const data = await resp.json();
          if (data.status === 'ok') {
            healthText.textContent = 'online';
            healthDot.className = 'dot';
          } else {
            healthText.textContent = 'degraded';
            healthDot.className = 'dot off';
          }
        } catch (_) {
          healthText.textContent = 'offline';
          healthDot.className = 'dot off';
        }
      }

      // ---------- render summary from data ----------
      function renderSummary(data) {
        const severityClass = data.severity === 'high' ? 'severity-high' :
                             data.severity === 'medium' ? 'severity-medium' : 'severity-low';

        const items = [
          { icon: 'fa-ticket', label: 'Ticket', value: data.ticket_id || '—' },
          { icon: 'fa-exchange-alt', label: 'Transaction', value: data.relevant_transaction_id || '—' },
          { icon: 'fa-gavel', label: 'Verdict', value: data.evidence_verdict || '—' },
          { icon: 'fa-folder', label: 'Case Type', value: data.case_type || '—' },
          { icon: 'fa-exclamation-triangle', label: 'Severity', value: `<span class="${severityClass}">${data.severity || '—'}</span>` },
          { icon: 'fa-building', label: 'Dept', value: data.department || '—' },
          { icon: 'fa-user-check', label: 'Human Review', value: data.human_review_required ? '✅ required' : '⏭️ not required' },
          { icon: 'fa-percent', label: 'Confidence', value: data.confidence ? `${(data.confidence * 100).toFixed(0)}%` : '—' },
        ];

        summaryGrid.innerHTML = items.map(item => `
          <div class="summary-item">
            <div class="icon"><i class="fas ${item.icon}"></i></div>
            <div class="label">${item.label}</div>
            <div class="value">${item.value}</div>
          </div>
        `).join('');

        // reason codes as tags
        if (data.reason_codes && data.reason_codes.length) {
          const tags = data.reason_codes.map(c => `<span>${c.replace(/_/g, ' ')}</span>`).join('');
          summaryGrid.innerHTML += `
            <div class="summary-item" style="grid-column: 1 / -1; border-bottom: none; flex-wrap: wrap;">
              <div class="icon"><i class="fas fa-tags"></i></div>
              <div class="label">Reasons</div>
              <div class="value"><div class="reason-tags">${tags}</div></div>
            </div>
          `;
        }

        // agent summary as extra
        if (data.agent_summary) {
          summaryGrid.innerHTML += `
            <div class="summary-item" style="grid-column: 1 / -1; border-bottom: none; flex-wrap: wrap; align-items: flex-start;">
              <div class="icon"><i class="fas fa-comment"></i></div>
              <div class="label">Summary</div>
              <div class="value" style="font-size:0.8rem; font-weight:400; color: var(--text-muted);">${data.agent_summary}</div>
            </div>
          `;
        }
      }

      // ---------- update result (both boxes) ----------
      function updateResult(data) {
        result.textContent = pretty(data);
        renderSummary(data);
        resultStatus.textContent = '✓ loaded';
        resultStatus.className = 'status-line';
      }

      // ---------- analyze ----------
      async function runAnalysis() {
        resultStatus.textContent = 'scanning…';
        resultStatus.className = 'status-line';
        try {
          const raw = payload.value.trim();
          if (!raw) throw new Error('empty payload');
          const body = JSON.parse(raw);
          const resp = await fetch('/analyze-ticket', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const data = await resp.json();
          updateResult(data);
        } catch (err) {
          result.textContent = String(err);
          resultStatus.textContent = '✗ error';
          resultStatus.className = 'status-line error-tag';
          summaryGrid.innerHTML = `<div style="padding:12px;color:var(--text-muted);">⚠️ ${String(err)}</div>`;
        }
      }

      function loadSample() {
        payload.value = pretty(SAMPLE);
        document.getElementById('payloadStatus').textContent = 'sample loaded';
        // auto-render sample preview
        updateResult(SAMPLE);
      }

      // ---------- ROBOT follow click ----------
      function moveEyes(clientX, clientY) {
        const rect = robotContainer.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        const dx = clientX - cx;
        const dy = clientY - cy;
        const maxDist = 22;
        const dist = Math.min(Math.hypot(dx, dy), maxDist);
        const angle = Math.atan2(dy, dx);
        const shiftX = Math.cos(angle) * dist;
        const shiftY = Math.sin(angle) * dist;
        const t = `translate(${shiftX}px, ${shiftY}px)`;
        eyeLeft.style.transform = t;
        eyeRight.style.transform = t;
      }

      function resetEyes() {
        eyeLeft.style.transform = 'translate(0px, 0px)';
        eyeRight.style.transform = 'translate(0px, 0px)';
      }

      document.addEventListener('click', (e) => {
        moveEyes(e.clientX, e.clientY);
        robotMouth.textContent = '◉';
        setTimeout(() => { robotMouth.textContent = '⌣'; }, 250);
      });
      document.addEventListener('mouseleave', () => { resetEyes(); robotMouth.textContent = '⌣'; });
      robotContainer.addEventListener('click', (e) => {
        e.stopPropagation();
        resetEyes();
        robotMouth.textContent = '⌣';
      });

      // ---------- init ----------
      payload.value = pretty(SAMPLE);
      updateResult(SAMPLE);
      loadSampleBtn.addEventListener('click', loadSample);
      analyzeBtn.addEventListener('click', runAnalysis);
      payload.addEventListener('input', () => {
        document.getElementById('payloadStatus').textContent = 'editing';
      });
      checkHealth();
      window.addEventListener('resize', resetEyes);

      console.log('🔥 CYBER BENTO + dual result boxes + robot');
    })();
  </script>
</body>
</html>
